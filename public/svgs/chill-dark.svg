<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220" width="300" height="220">
  <defs>
    <style>
      .a1{animation:d .65s cubic-bezier(.34,1.56,.64,1) .1s both}
      .a2{animation:f .35s ease .5s both}
      .a3{animation:f .35s ease .52s both}
      .a4{animation:p .3s cubic-bezier(.34,1.56,.64,1) .72s both;transform-origin:99px 85px}
      .a5{animation:p .3s cubic-bezier(.34,1.56,.64,1) .80s both;transform-origin:99px 85px}
      .a6{animation:p .28s cubic-bezier(.34,1.56,.64,1) .86s both;transform-origin:201px 72px}
      .a7{animation:p .28s cubic-bezier(.34,1.56,.64,1) .93s both;transform-origin:220px 87px}
      .a8{animation:p .28s cubic-bezier(.34,1.56,.64,1) 1.0s both;transform-origin:182px 87px}
      .a9{animation:p .28s cubic-bezier(.34,1.56,.64,1) 1.07s both;transform-origin:201px 102px}
      .a10{animation:p .4s cubic-bezier(.34,1.56,.64,1) 1.13s both;transform-origin:150px 87px}
      .t1{animation:f .45s ease 1.35s both}
      .t2{animation:f .45s ease 1.5s both}
      .ln{animation:f .35s ease 1.45s both}
      .ag{animation:gl 2.5s ease-in-out 2s infinite}
      .as{animation:sc 3.5s linear 2.2s infinite}
      .ar{animation:sk .14s ease 1.18s 3}
      .ac{animation:b 1.1s step-end 1.9s infinite}
      @keyframes f{from{opacity:0}to{opacity:1}}
      @keyframes d{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
      @keyframes p{from{opacity:0;transform:scale(0)}to{opacity:1;transform:scale(1)}}
      @keyframes sk{0%,100%{transform:translateX(0)}33%{transform:translateX(-2px)}66%{transform:translateX(2px)}}
      @keyframes gl{0%,100%{opacity:.08}50%{opacity:.22}}
      @keyframes sc{from{transform:translateY(-10px)}to{transform:translateY(230px)}}
      @keyframes b{0%,100%{opacity:1}50%{opacity:0}}
    </style>
  </defs>

  <!-- Ambient glow — no background rect -->
  <ellipse class="ag" cx="150" cy="85" rx="115" ry="65" fill="#ef4444"/>
  <!-- Scanline sweep -->
  <rect class="as" x="0" y="0" width="300" height="5" fill="#ef4444" opacity="0.08"/>

  <g class="a1 ar">
    <path class="a2" d="M62 92 C58 70 70 50 90 46 L150 46 L210 46 C230 50 242 70 238 92 L232 120 C229 130 218 134 206 132 L176 124 L124 124 L94 132 C82 134 71 130 68 120 Z" fill="#1a0000" stroke="#ef4444" stroke-width="2"/>
    <ellipse class="a3" cx="80"  cy="122" rx="18" ry="14" fill="#1a0000" stroke="#ef4444" stroke-width="1.5"/>
    <ellipse class="a3" cx="220" cy="122" rx="18" ry="14" fill="#1a0000" stroke="#ef4444" stroke-width="1.5"/>
    <rect class="a4" x="94" y="66" width="10" height="32" rx="3" fill="#ef4444"/>
    <rect class="a5" x="82" y="78" width="34" height="10" rx="3" fill="#ef4444"/>
    <circle class="a6" cx="201" cy="72" r="9" fill="#ef4444"/>
    <circle class="a7" cx="220" cy="87" r="9" fill="#ef4444"/>
    <circle class="a8" cx="182" cy="87" r="9" fill="#ef4444"/>
    <circle class="a9" cx="201" cy="102" r="9" fill="#ef4444"/>
    <text x="201" y="75.5"  font-family="sans-serif" font-size="9" font-weight="700" fill="#000" text-anchor="middle" class="a6">Y</text>
    <text x="220" y="90.5"  font-family="sans-serif" font-size="9" font-weight="700" fill="#000" text-anchor="middle" class="a7">B</text>
    <text x="182" y="90.5"  font-family="sans-serif" font-size="9" font-weight="700" fill="#000" text-anchor="middle" class="a8">X</text>
    <text x="201" y="105.5" font-family="sans-serif" font-size="9" font-weight="700" fill="#000" text-anchor="middle" class="a9">A</text>
    <text class="a10" x="150" y="92" font-family="monospace" font-size="15" font-weight="700" fill="#ef4444" text-anchor="middle">{/}</text>
  </g>

  <line class="ln" x1="80" y1="148" x2="220" y2="148" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <text class="t1" x="150" y="168" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#f8fafc" text-anchor="middle" letter-spacing="0.4">game</text>
  <text class="t2" x="150" y="204" font-family="monospace" font-size="26" font-weight="700" fill="#ef4444" text-anchor="middle" letter-spacing="3">CODE</text>
  <text class="ac" x="177" y="204" font-family="monospace" font-size="26" font-weight="700" fill="#ef4444">_</text>
</svg>
