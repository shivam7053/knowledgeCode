services:
  db:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://db:27017
      - MONGODB_DB_NAME=knowledgecode_db
      - SANDBOX_VOLUME_NAME=knowledgecode_sandbox_temp
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Mount Docker socket for containerized code execution
      - sandbox_temp:/sandbox
    depends_on:
      - db
      # Ensure execution images are built before the API service starts
      - python_exec_builder
      - node_exec_builder
      - java_exec_builder
      - cpp_exec_builder

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api

  # Services to build the execution images (they don't need to run as containers)
  python_exec_builder:
    build:
      context: ./exec_python
      dockerfile: Dockerfile
    image: knowledgecode-python-exec # Tag the image for use by the API service

  node_exec_builder:
    build:
      context: ./exec_node
      dockerfile: Dockerfile
    image: knowledgecode-node-exec

  java_exec_builder:
    build:
      context: ./exec_java
      dockerfile: Dockerfile
    image: knowledgecode-java-exec

  cpp_exec_builder:
    build:
      context: ./exec_cpp
      dockerfile: Dockerfile
    image: knowledgecode-cpp-exec

volumes:
  mongo_data:
  sandbox_temp:
    name: knowledgecode_sandbox_temp